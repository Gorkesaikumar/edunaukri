{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Sign in to your {{ PLATFORM_NAME }} account.{% endblock %}">
    <title>{% block title %}{{ PLATFORM_NAME }} | Login{% endblock %}</title>

    {% include "partials/site_icons.html" %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/auth.css' %}?v=2" rel="stylesheet">
    <link href="{% static 'css/edu-notify.css' %}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body class="ed-auth-page">
    <div class="ed-auth-bg" aria-hidden="true">
        <span class="ed-auth-bg__shape ed-auth-bg__shape--1"></span>
        <span class="ed-auth-bg__shape ed-auth-bg__shape--2"></span>
    </div>

    <a href="{% block auth_back_href %}{% url 'domain_selection' %}{% endblock %}" class="ed-auth-back">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
        Back
    </a>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'js/edu-notify.js' %}"></script>
    <script src="{% static 'js/auth/common.js' %}?v=2"></script>
    <script src="{% static 'js/auth/auth-session.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
