<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Server Error (500) | EduNaukri</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 text-center">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden p-5 bg-white">
                    <div class="mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger rounded-circle p-4" style="width: 90px; height: 90px;">
                            <i class="bi bi-exclamation-triangle-fill fs-1"></i>
                        </div>
                    </div>
                    <h1 class="display-4 fw-bold mb-3 text-dark">500</h1>
                    <h3 class="fw-semibold text-secondary mb-3">Internal Server Error</h3>
                    <p class="text-muted fs-6 mb-5">
                        Oops! Something went wrong on our end. Our engineering team has been notified and is working to resolve the issue. Please try again later.
                    </p>
                    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                        <a href="javascript:window.location.reload()" class="btn btn-outline-secondary btn-lg px-4 rounded-pill">
                            <i class="bi bi-arrow-clockwise me-2"></i>Try Again
                        </a>
                        <a href="/" class="btn btn-primary btn-lg px-4 rounded-pill shadow-sm">
                            <i class="bi bi-house-door me-2"></i>Home Page
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
