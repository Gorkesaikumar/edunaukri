{% extends "super_admin/base.html" %}
{% load static %}

{% block page_actions %}
<div class="flex items-center gap-2">
    <span class="text-xs text-on-surface-variant font-medium">Export Formats Available: <strong>CSV Table</strong></span>
</div>
{% endblock %}

{% block content %}
<!-- Reports Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for rpt in report_types %}
    <div class="bg-white p-6 rounded-xl border border-outline-variant/30 shadow-xs flex flex-col justify-between hover:border-primary/50 transition-all group">
        <div>
            <div class="flex items-start justify-between gap-4 mb-3">
                <div class="w-10 h-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined !text-xl">assessment</span>
                </div>
                <span class="px-2.5 py-0.5 rounded-full bg-gray-100 text-on-surface-variant text-[10px] font-bold font-mono">ID: {{ rpt.id }}</span>
            </div>
            <h3 class="text-base font-extrabold text-on-surface group-hover:text-primary transition-colors">{{ rpt.name }}</h3>
            <p class="text-xs text-on-surface-variant mt-1.5 leading-relaxed">{{ rpt.desc }}</p>
        </div>

        <div class="mt-6 pt-4 border-t border-outline-variant/20 flex items-center gap-2">
            <a href="?export={{ rpt.id }}&format=csv" class="flex-1 py-2 text-center text-xs font-bold bg-primary hover:bg-primary/90 text-white rounded-lg shadow-sm transition-all flex items-center justify-center gap-1">
                <span class="material-symbols-outlined !text-sm">table_view</span> CSV Table
            </a>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
