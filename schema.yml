      - in: path
        name: profile_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: profile_type
        schema:
          type: string
        required: true
      tags:
      - accounts-profiles
      security:
      - cookieAuth: []
      - DomainJWT: []
      - BearerAuth: []
      - SessionAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelope'
          description: ''
