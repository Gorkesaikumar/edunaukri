            schema:
              $ref: '#/components/schemas/PatchedJobSeekerProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedJobSeekerProfileRequest'
      security:
      - cookieAuth: []
      - DomainJWT: []
      - BearerAuth: []
      - SessionAuth: []
      responses:
