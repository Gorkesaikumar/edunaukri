user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ==========================================
    # Logging Format & Optimization
    # ==========================================
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main buffer=32k flush=5s;

    # ==========================================
    # Core Performance & Network Settings
    # ==========================================
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;

    # ==========================================
    # Open File Cache (Static Asset Optimization)
    # ==========================================
    open_file_cache          max=10000 inactive=300s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ==========================================
    # Buffer Settings (Large File Uploads)
    # ==========================================
    client_max_body_size        100m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;

    # ==========================================
    # Rate Limiting & DDoS Protection Zones
    # ==========================================
    # Limit connections: max 20 concurrent connections per IP address across all virtual hosts
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;
    limit_conn_status 429;

    # General traffic rate limit: 20 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;
    # Strict rate limit for authentication & sensitive endpoints: 5 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    # API burst rate limit: 50 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_req_status 429;

    # ==========================================
    # Gzip Compression
    # ==========================================
    gzip                on;
    gzip_comp_level     6;
    gzip_min_length     256;
    gzip_proxied        any;
    gzip_vary           on;
    gzip_buffers        16 8k;
    gzip_http_version   1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # Include all virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
