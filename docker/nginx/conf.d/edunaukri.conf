# ==========================================
# Upstream Definition for Django/Daphne
# ==========================================
upstream django_backend {
    server web:8000 keepalive 32;
}

# ==========================================
# HTTP Server Block (Redirect to HTTPS & ACME Challenge)
# ==========================================
server {
    listen 80;
    listen [::]:80;
    server_name www.edunaukri.com api.edunaukri.com edunaukri.com localhost;

    # Let's Encrypt ACME Challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# HTTPS Server Block (Production Secure Server)
# ==========================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.edunaukri.com api.edunaukri.com edunaukri.com localhost;

    # ==========================================
    # SSL/TLS Configuration
    # ==========================================
    ssl_certificate     /etc/nginx/ssl/live/edunaukri.crt;
    ssl_certificate_key /etc/nginx/ssl/live/edunaukri.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Diffie-Hellman parameters for robust key exchange
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ==========================================
    # Security Headers
    # ==========================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Connection limit per IP across this virtual host
    limit_conn addr_limit 20;

    # ==========================================
    # Static Files Configuration
    # ==========================================
    location /staticfiles/ {
        alias /app/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Ensure security headers are preserved inside location blocks
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Favicon and Robots routing
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        alias /app/staticfiles/img/favicon.svg;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        alias /app/staticfiles/robots.txt;
    }

    # ==========================================
    # Media Files & Security Hardening
    # ==========================================
    # Prevent execution of any scripts/binaries uploaded inside user media folders
    location ~* ^/media/.*\.(py|pl|php|sh|cgi|asp|jsp|exe)$ {
        return 403;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ==========================================
    # Rate-Limited Authentication & Login Routes
    # ==========================================
    location ~* ^/(auth|api/v1/auth|sign-in|super-admin/login)/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ==========================================
    # API Routes with API Rate Limiting
    # ==========================================
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ==========================================
    # WebSockets & Live Activity Channels
    # ==========================================
    location ~* ^/(ws|live-activity)/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Extended timeout for long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==========================================
    # Default Proxy Location (All Other Routes)
    # ==========================================
    location / {
        limit_req zone=general_limit burst=20 nodelay;

        # Disable proxy buffering for large file/video/resume uploads
        proxy_request_buffering off;
        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_buffer_size 64k;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
